<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- 极简维基百科风格地球图标 - 扁平化设计 -->
  
  <!-- 地球主体 - 扁平化圆形 -->
  <circle cx="12" cy="12" r="10" fill="#1a73e8" stroke="#0d47a1" stroke-width="0.8"/>
  
  <!-- 简化的大陆轮廓 -->
  <g fill="#ffffff" opacity="0.9">
    <!-- 简化非洲 -->
    <path d="M 9 5 L 10 7 L 9 9 L 8 7 Z"/>
    
    <!-- 简化欧亚 -->
    <path d="M 12 3 L 15 4 L 14 6 L 11 5 Z"/>
    
    <!-- 简化美洲 -->
    <path d="M 5 6 L 6 8 L 5 10 L 4 8 Z"/>
    
    <!-- 简化澳洲 -->
    <circle cx="16" cy="13" r="1"/>
  </g>
  
  <!-- 简化的经纬线 -->
  <g stroke="#ffffff" stroke-width="0.4" fill="none" opacity="0.7">
    <!-- 中央经线 -->
    <line x1="12" y1="2" x2="12" y2="22"/>
    
    <!-- 左右经线 -->
    <path d="M 6 4 Q 12 2 18 4 L 18 20 Q 12 22 6 20 Z"/>
    
    <!-- 赤道 -->
    <ellipse cx="12" cy="12" rx="10" ry="2.5"/>
    
    <!-- 北回归线 -->
    <path d="M 4 8 Q 12 6 20 8"/>
    
    <!-- 南回归线 -->
    <path d="M 4 16 Q 12 18 20 16"/>
  </g>
</svg>