<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- 现代地理空间Logo - 极简主义风格 -->
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="modernGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 背景圆 - 现代渐变 -->
  <circle cx="12" cy="12" r="10" fill="url(#modernGradient)" opacity="0.9"/>
  
  <!-- 内发光效果 -->
  <circle cx="12" cy="12" r="8" fill="url(#centerGlow)" opacity="0.3"/>
  
  <!-- 简化的地球网格 -->
  <g stroke="#ffffff" stroke-width="0.4" fill="none" opacity="0.8">
    <!-- 主要经线 -->
    <line x1="12" y1="2" x2="12" y2="22"/>
    <path d="M 6 4 Q 12 2 18 4 L 18 20 Q 12 22 6 20 Z"/>
    
    <!-- 主要纬线 -->
    <ellipse cx="12" cy="12" rx="10" ry="2.5"/>
    <path d="M 4 8 Q 12 6 20 8"/>
    <path d="M 4 16 Q 12 18 20 16"/>
  </g>
  
  <!-- 数据节点 - 现代圆点 -->
  <g fill="#ffffff">
    <circle cx="8" cy="8" r="1"/>
    <circle cx="16" cy="10" r="1"/>
    <circle cx="12" cy="16" r="1"/>
    <circle cx="6" cy="14" r="0.8"/>
    <circle cx="18" cy="14" r="0.8"/>
  </g>
  
  <!-- 中心定位点 -->
  <g fill="#ffffff">
    <circle cx="12" cy="12" r="1.5"/>
    <circle cx="12" cy="12" r="0.8" fill="url(#modernGradient)"/>
  </g>
  
  <!-- 现代外环 -->
  <circle cx="12" cy="12" r="10.2" stroke="#ffffff" stroke-width="0.3" fill="none" opacity="0.6"/>
</svg>