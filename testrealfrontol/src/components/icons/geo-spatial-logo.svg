<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- 地理空间数据系统Logo - 结合地球和地理信息系统元素 -->
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="geoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F51B5;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- 地球背景 -->
  <circle cx="12" cy="12" r="10" fill="url(#geoGradient)" opacity="0.9"/>
  
  <!-- 地球网格线 - 经纬线 -->
  <g stroke="#ffffff" stroke-width="0.3" fill="none" opacity="0.8">
    <!-- 经线 -->
    <line x1="12" y1="2" x2="12" y2="22"/>
    <path d="M 6 4 Q 12 2 18 4 L 18 20 Q 12 22 6 20 Z"/>
    <path d="M 4 8 Q 12 4 20 8 L 20 16 Q 12 20 4 16 Z"/>
    
    <!-- 纬线 -->
    <ellipse cx="12" cy="12" rx="10" ry="2.5"/>
    <path d="M 4 8 Q 12 6 20 8"/>
    <path d="M 4 16 Q 12 18 20 16"/>
  </g>
  
  <!-- 地理数据点 - 表示空间数据 -->
  <g fill="#ffffff" opacity="0.9">
    <!-- 数据点 -->
    <circle cx="8" cy="8" r="0.8"/>
    <circle cx="16" cy="10" r="0.8"/>
    <circle cx="12" cy="16" r="0.8"/>
    <circle cx="6" cy="14" r="0.8"/>
    <circle cx="18" cy="14" r="0.8"/>
  </g>
  
  <!-- 数据连接线 - 表示数据关联 -->
  <g stroke="#ffffff" stroke-width="0.2" fill="none" opacity="0.6">
    <line x1="8" y1="8" x2="16" y2="10"/>
    <line x1="16" y1="10" x2="12" y2="16"/>
    <line x1="12" y1="16" x2="6" y2="14"/>
    <line x1="8" y1="8" x2="18" y2="14"/>
  </g>
  
  <!-- 外层数据环 - 表示数据安全保护 -->
  <circle cx="12" cy="12" r="10.5" stroke="#ffffff" stroke-width="0.3" fill="none" opacity="0.5"/>
  <circle cx="12" cy="12" r="9.5" stroke="#ffffff" stroke-width="0.2" fill="none" opacity="0.3"/>
  
  <!-- 中心定位符号 - 表示精准定位 -->
  <g stroke="#ffffff" stroke-width="0.4" fill="none">
    <circle cx="12" cy="12" r="2"/>
    <line x1="12" y1="10" x2="12" y2="8"/>
    <line x1="12" y1="14" x2="12" y2="16"/>
    <line x1="10" y1="12" x2="8" y2="12"/>
    <line x1="14" y1="12" x2="16" y2="12"/>
  </g>
  
  <!-- 科技感光效 -->
  <circle cx="12" cy="12" r="11" stroke="#4CAF50" stroke-width="0.2" opacity="0.4" fill="none"/>
</svg>