version: "3.9"

services:
  # ─── MySQL (Business Data) ───────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: geodata-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-geodata_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-esri_test}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL + PostGIS (Spatial Data) ─────────────────
  postgres:
    image: postgis/postgis:15-3.4
    container_name: geodata-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geodata_pg_2024}
      POSTGRES_DB: ${POSTGRES_DB:-esri_test}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Caching & Session Store) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: geodata-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ─── Flask Backend ───────────────────────────────────────
  backend:
    build:
      context: ./testrealend
      dockerfile: Dockerfile
    container_name: geodata-backend
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
      MYSQL_URI: "mysql+mysqldb://root:${MYSQL_ROOT_PASSWORD:-geodata_root_2024}@mysql/${MYSQL_DATABASE:-esri_test}"
      POSTGRES_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-geodata_pg_2024}@postgres/${POSTGRES_DB:-esri_test}"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
      UPLOAD_FOLDER: /data/upload_folder
      WATERMARK_FOLDER: /data/watermark_folder
      EXTRACTED_FOLDER: /data/extracted_folder
      LOG_DIR: /var/log/geodata
    volumes:
      - upload_data:/data/upload_folder
      - watermark_data:/data/watermark_folder
      - extracted_data:/data/extracted_folder
      - backend_logs:/var/log/geodata
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Vue Frontend (Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./testrealfrontol
      dockerfile: Dockerfile
    container_name: geodata-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─── Prometheus (Metrics Monitoring) ─────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: geodata-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend

  # ─── Grafana (Dashboards & Visualization) ───────────────
  grafana:
    image: grafana/grafana:latest
    container_name: geodata-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-geodata_grafana}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/geodata-overview.json
      GF_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_healthy

  # ─── Loki (Log Aggregation) ─────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    container_name: geodata-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./loki-config.yml:/etc/loki/config.yml:ro
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Promtail (Log Collector) ───────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    container_name: geodata-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - backend_logs:/var/log/geodata:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

volumes:
  mysql_data:
  postgres_data:
  redis_data:
  upload_data:
  watermark_data:
  extracted_data:
  prometheus_data:
  grafana_data:
  loki_data:
  backend_logs:
